services:
  api-gateway:
    build: ./api-gateway
    ports:
      - "4000:4000"
    env_file:
      - ./api-gateway/.env
    depends_on:
      - user-service
      - product-service
      - order-service

  user-service:
    build: ./user-service
    ports:
      - "4003:4003"
    env_file:
      - ./user-service/.env

  product-service:
    build: ./product-service
    ports:
      - "4002:4002"
    env_file:
      - ./product-service/.env

  order-service:
    build: ./order-service
    ports:
      - "4001:4001"
    env_file:
      - ./order-service/.env